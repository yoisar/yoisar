# MinIO S3 — storage.archivo.yoisar.com (Producción, 39000)
# ──────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name storage.archivo.yoisar.com;

    root /www/wwwroot/storage.archivo.yoisar.com;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/storage.archivo.yoisar.com;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }

    access_log /www/wwwlogs/storage.archivo.yoisar.com.log;
    error_log  /www/wwwlogs/storage.archivo.yoisar.com.error.log;
}

server {
    listen 443 ssl http2;
    server_name storage.archivo.yoisar.com;

    ssl_certificate     /etc/letsencrypt/live/storage.archivo.yoisar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/storage.archivo.yoisar.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 0;

    proxy_connect_timeout 300s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    location ~ \.well-known {
        allow all;
    }

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn) {
        return 404;
    }

    location / {
        proxy_pass http://127.0.0.1:39000;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-NginX-Proxy     true;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering         off;
        proxy_request_buffering off;
    }

    access_log /www/wwwlogs/storage.archivo.yoisar.com.log;
    error_log  /www/wwwlogs/storage.archivo.yoisar.com.error.log;
}

