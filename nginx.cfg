    # ==========================================
    # CONFIGURACIÓN PARA front.guajira.dev.yoisar.com (NEXT EN DOCKER)
    # Contenedor esperado: guajira_vps_frontend -> 127.0.0.1:13000
    # Requiere registro DNS A para front.guajira.dev.yoisar.com
    # Archivo de referencia: guajira/app/docker/nginx/front.guajira.dev.yoisar.com.conf
    # ==========================================
    server {
        listen 80;
        listen [::]:80;
        server_name front.guajira.dev.yoisar.com;

        location ^~ /.well-known/acme-challenge/ {
            root /www/wwwroot/front.guajira.dev.yoisar.com;
            allow all;
        }

        #HTTP_TO_HTTPS_START
        if ($server_port !~ 443){
            rewrite ^(/.*)$ https://$host$1 permanent;
        }
        #HTTP_TO_HTTPS_END
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name front.guajira.dev.yoisar.com;

        #SSL-START SSL related configuration
        ssl_certificate /www/server/panel/vhost/cert/front.guajira.dev.yoisar.com/fullchain.pem;
        ssl_certificate_key /www/server/panel/vhost/cert/front.guajira.dev.yoisar.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_tickets on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        add_header Strict-Transport-Security "max-age=31536000";
        error_page 497 https://$host$request_uri;
        #SSL-END

        #ERROR-PAGE-START
        error_page 404 /404.html;
        error_page 502 /502.html;
        error_page 503 /503.html;
        #ERROR-PAGE-END

        # Proxy pass al contenedor Docker Next.js (puerto interno 13000)
        location / {
            proxy_pass http://127.0.0.1:13000;
            proxy_http_version 1.1;

            # Headers necesarios para Next.js
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Configuración para Hot Module Replacement (HMR) en desarrollo
            proxy_cache_bypass $http_upgrade;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Optimización para assets estáticos de Next.js
        location /_next/static/ {
            proxy_pass http://127.0.0.1:13000;
            proxy_cache_valid 200 60m;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Optimización para imágenes de Next.js
        location /_next/image {
            proxy_pass http://127.0.0.1:13000;
            proxy_cache_valid 200 60m;
        }

        # Public folder de Next.js
        location /static/ {
            proxy_pass http://127.0.0.1:13000;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Favicon y otros recursos comunes
        location ~* \.(ico|png|jpg|jpeg|gif|svg)$ {
            proxy_pass http://127.0.0.1:13000;
            expires 30d;
            add_header Cache-Control "public";
        }

        # Forbidden files
        location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md) {
            return 404;
        }

        # Well-known para SSL
        location ~ \.well-known {
            allow all;
        }

        # Logs
        access_log /www/wwwlogs/front.guajira.dev.yoisar.com.log;
        error_log /www/wwwlogs/front.guajira.dev.yoisar.com.error.log;
    }

    # ==========================================
    # CONFIGURACIÓN PARA s3.guajira.dev.yoisar.com (MINIO S3 EN DOCKER)
    # Contenedor: guajira_vps_minio -> 127.0.0.1:19000
    # NOTA: Puerto 9000 del host ya está en uso por cp-api.
    #       MinIO en VPS corre en 19000 (API) y 19001 (consola).
    # Requiere registro DNS A para s3.guajira.dev.yoisar.com
    # Emitir certificado desde aaPanel → SSL → Let's Encrypt
    # ==========================================
    server {
        listen 80;
        listen [::]:80;
        server_name s3.guajira.dev.yoisar.com;
        location ^~ /.well-known/acme-challenge/ {
            root /www/wwwroot/s3.guajira.dev.yoisar.com;
            allow all;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name s3.guajira.dev.yoisar.com;

        ssl_certificate /www/server/panel/vhost/cert/s3.guajira.dev.yoisar.com/fullchain.pem;
        ssl_certificate_key /www/server/panel/vhost/cert/s3.guajira.dev.yoisar.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Uploads de imágenes (hasta 64MB)
        client_max_body_size 64m;

        # Timeouts generosos para uploads/downloads grandes
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        location ~ \.well-known {
            allow all;
        }

        location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project) {
            return 404;
        }

        # Proxy a MinIO en puerto 19000 del host
        location / {
            # CORS: permitir que el frontend cargue imágenes desde este dominio
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Content-Type" always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin  "*";
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
                add_header Access-Control-Allow-Headers "Range, Content-Type";
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            proxy_pass http://127.0.0.1:19000;
            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-NginX-Proxy     true;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Sin buffering para streaming S3
            proxy_buffering         off;
            proxy_request_buffering off;
        }

        access_log /www/wwwlogs/s3.guajira.dev.yoisar.com.log;
        error_log /www/wwwlogs/s3.guajira.dev.yoisar.com.error.log;
    }

