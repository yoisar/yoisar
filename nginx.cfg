# Puerto host: 9000 → MinIO API (distriboo_prod_minio)
# Bucket: distriboo-prod-products
# CORS: solo https://distriboo.yoisar.com
# ==============================================
server {
    listen 80;
    server_name img.distriboo.yoisar.com;
