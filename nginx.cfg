    # Upstream con health check para detectar cuando el backend está caído
    upstream fideliza_backend {
        server 127.0.0.1:3210 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name fideliza.yoisar.com;
        location ^~ /.well-known/acme-challenge/ {
            root /www/wwwroot/fideliza.yoisar.com;
            allow all;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

