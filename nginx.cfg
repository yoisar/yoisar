        include /etc/nginx/mime.types;

        # Headers base
        add_header X-Fideliza-Domain $host always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;

        # 🔧 PÁGINA DE MANTENIMIENTO - Servir directamente desde servidor
        location = /maintenance.html {
            root /www/wwwroot/fideliza.yoisar.com/app;
            try_files /server/maintenance.html =503;
        }

        # ARCHIVOS JAVASCRIPT (MÁXIMA PRIORIDAD)
        location ~* \.(js|mjs|jsx)$ {
            add_header Content-Type application/javascript always;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Fideliza-Asset "javascript" always;
            expires 1y;

            proxy_pass http://fideliza_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_intercept_errors on;

            # Redirigir a mantenimiento si backend está caído
            error_page 502 503 504 = @maintenance;
            error_page 404 = @js_not_found;
        }

        # RUTAS ESPECÍFICAS DE EXPO JS
        location ^~ /_expo/static/js/ {
            add_header Content-Type application/javascript always;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Fideliza-Asset "expo-js" always;
            expires 1y;

            proxy_pass http://fideliza_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_intercept_errors on;

            # Redirigir a mantenimiento si backend está caído
            error_page 502 503 504 = @maintenance;
            error_page 404 = @js_not_found;
        }

