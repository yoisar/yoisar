    # ==========================================
    # CONFIGURACIÓN PARA cdn-s3.yoisar.com (CDN S3 PRODUCCIÓN)
    # ACTUALIZADO: 12 NOV 2025 - FIX CACHE CDN IMAGES
    # ==========================================

    # 🔧 ZONA DE CACHE PARA CDN S3 (declarada dentro del bloque http)
    proxy_cache_path /www/cache/cdn-s3-prod levels=1:2 keys_zone=cdn_s3_cache:100m max_size=10g inactive=30d use_temp_path=off;

    server {
        listen 80;
        server_name cdn-s3.yoisar.com;

        # Permitir acceso HTTP para verificación SSL Let's Encrypt
        location /.well-known/ {
            root /www/wwwroot/cdn-s3.yoisar.com;
            allow all;
        }

        # Redirigir todo lo demás a HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS configuration - AHORA CON CERTIFICADOS SSL Y CACHE MEJORADO
    server {
        listen 443 ssl http2;
        server_name cdn-s3.yoisar.com;

        ssl_certificate /etc/letsencrypt/live/cdn-s3.yoisar.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cdn-s3.yoisar.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Headers de seguridad
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # 🚀 Headers CDN con indicador de cache hit/miss
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;

        # Configuración específica para CDN/lectura pública
        client_max_body_size 100M;

        location / {
            # ✅ PROXY CACHE HABILITADO (FIX PRINCIPAL)
            proxy_cache cdn_s3_cache;
            proxy_cache_key "$scheme$proxy_host$request_uri";
            proxy_cache_valid 200 30d;  # Cachear respuestas 200 por 30 días
            proxy_cache_valid 404 1m;   # Cachear 404 por 1 minuto (evita caída si imagen no existe)
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_lock on;

            # ✅ BUFFERING HABILITADO PARA CACHE (CAMBIO CRÍTICO)
            proxy_buffering on;
            proxy_buffers 16 16k;
            proxy_buffer_size 16k;

            # Ignorar headers que previenen cache
            proxy_ignore_headers Set-Cookie Cache-Control Expires;

            proxy_pass http://127.0.0.1:9020; # Puerto del contenedor cp-minio (production)
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            expires 30d;
        }

        access_log /www/wwwlogs/cdn_s3_yoisar_access.log;
        error_log /www/wwwlogs/cdn_s3_yoisar_error.log;
    }

