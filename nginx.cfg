# Configuración para producción (www.ventarifas.com y ventarifas.com)
server {
    listen 80;
    server_name www.ventarifas.com ventarifas.com;
    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/www.ventarifas.com;
        allow all;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.ventarifas.com ventarifas.com;

    # Root dir para archivos estáticos locales (maintenance.html, favicon, etc.)
    root /www/wwwroot/www.ventarifas.com;

    ssl_certificate /www/server/panel/vhost/cert/www.ventarifas.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/www.ventarifas.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ============================================================
    # PÁGINA DE MANTENIMIENTO
    # Se muestra automáticamente cuando el docker (puerto 8081) esté caído.
    # Archivo: /www/wwwroot/www.ventarifas.com/maintenance.html
    # Para activar mantenimiento manual: descomentar la línea return 503.
    # ============================================================
    # return 503;  # ← descomentar para mantenimiento manual

    error_page 502 503 504 /maintenance.html;

    location = /maintenance.html {
        root /www/wwwroot/www.ventarifas.com;
        internal;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Assets estáticos de Next.js (cache inmutable 1 año).
    # proxy_intercept_errors ON aquí para que cuando un chunk viejo (post-deploy)
    # devuelva 404 con body HTML desde Next.js, Nginx lo reemplace con un 404
    # limpio sin body. Así webpack recibe un 404 real (no text/html) y dispara
    # el ChunkLoadError correctamente → el guard inline del layout hace reload.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_intercept_errors on;
        error_page 404 = @ventarifas_static_404;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Named location: retorna 404 puro sin body HTML para chunks inexistentes
    location @ventarifas_static_404 {
        return 404;
    }

    # Todo lo demás → contenedor Next.js (puerto 8081 = producción)
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_intercept_errors on;  # Solo para la maintenance page (502/503/504)
        proxy_no_cache 1;           # Nginx nunca guarda en cache las páginas HTML
        proxy_cache_bypass 1;       # Nginx siempre va al upstream, ignora cache
        # Forzar no-cache en respuestas HTML para evitar que el browser
        # guarde la página con refs a chunks de un deploy anterior
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    access_log /www/wwwlogs/www_ventarifas_access.log;
    error_log /www/wwwlogs/www_ventarifas_error.log;
}

