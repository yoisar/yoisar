    # ==========================================
    # CONFIGURACIÓN PARA yoissnacks.com (APP PROPIA - DOCKER puerto 8082)
    # Antes: redirigía a fideliza.yoisar.com/yois-snacks
    # Ahora: sirve desde contenedor cp_frontend_yoissnacks_prod (puerto 8082)
    # Deploy: cd scripts && ./deploy-yoissnacks-production-vps.sh
    # ==========================================
    server {
        listen 80;
        server_name yoissnacks.com www.yoissnacks.com;
        location ^~ /.well-known/acme-challenge/ {
            root /www/wwwroot/yoissnacks.com;
            allow all;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Redirigir www → no-www (canonical: https://yoissnacks.com)
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name www.yoissnacks.com;

        ssl_certificate /www/server/panel/vhost/cert/yoissnacks.com/fullchain.pem;
        ssl_certificate_key /www/server/panel/vhost/cert/yoissnacks.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        return 301 https://yoissnacks.com$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name yoissnacks.com;

        ssl_certificate /www/server/panel/vhost/cert/yoissnacks.com/fullchain.pem;
        ssl_certificate_key /www/server/panel/vhost/cert/yoissnacks.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;

        error_page 502 503 504 /maintenance.html;

        location = /maintenance.html {
            root /www/wwwroot/yoissnacks.com;
            internal;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        # SEO: robots.txt y sitemap.xml con cache
        location = /robots.txt {
            proxy_pass http://127.0.0.1:8082;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Cache-Control "public, max-age=86400";
            access_log off;
        }

        location = /sitemap.xml {
            proxy_pass http://127.0.0.1:8082;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Cache-Control "public, max-age=86400";
            access_log off;
        }

        # Assets estáticos (JS, CSS, imágenes) — cache inmutable 1 año
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            proxy_pass http://127.0.0.1:8082;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # Todo lo demás → contenedor Expo Web estático (puerto 8082)
        location / {
            proxy_pass http://127.0.0.1:8082;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        access_log /www/wwwlogs/yoissnacks_access.log;
        error_log /www/wwwlogs/yoissnacks_error.log;
    }

