            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Redirigir a mantenimiento si backend está caído
            error_page 502 503 504 = @maintenance;
        }

        # OTRAS RUTAS EXPO
        location ^~ /_expo/ {
            add_header Cache-Control "public, max-age=86400" always;
            add_header X-Fideliza-Asset "expo-framework" always;

            proxy_pass http://fideliza_backend_test;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Redirigir a mantenimiento si backend está caído
            error_page 502 503 504 = @maintenance;
        }

        # ARCHIVOS ESTÁTICOS
        location ^~ /static/ {
            add_header Cache-Control "public, max-age=86400" always;
            add_header X-Fideliza-Asset "static" always;

            proxy_pass http://fideliza_backend_test;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Redirigir a mantenimiento si backend está caído
            error_page 502 503 504 = @maintenance;
        }

        # IMÁGENES Y FUENTES
        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Fideliza-Asset "media" always;
            expires 1y;

            proxy_pass http://fideliza_backend_test;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Redirigir a mantenimiento si backend está caído
            error_page 502 503 504 = @maintenance;
        }

        # 🔥 BACKEND API PROXY (PUERTO 8212) - AGREGADO 27 NOV 2025
        # CRÍTICO: Este proxy permite que el frontend acceda a la API backend
        # Frontend llama a https://test-fideliza.yoisar.com/api/* y se redirige a localhost:8212
        location /api/ {
            proxy_pass http://127.0.0.1:8212;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;

            # Timeouts para APIs
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Sin buffering para respuestas de API
            proxy_buffering off;
            proxy_request_buffering off;

            # Límites de tamaño de carga
            client_max_body_size 10M;

            # Redirigir a mantenimiento si backend está caído
            error_page 502 503 504 = @maintenance;
        }

        # HEALTH CHECK
        location = /health {
            add_header Content-Type application/json always;
            return 200 '{"status":"ok","app":"fideliza","domain":"$host","timestamp":"$time_iso8601"}';
        }

        # FALLBACK PARA JS NO ENCONTRADO
        location @js_not_found {
            add_header Content-Type application/javascript always;
            return 404 '// JavaScript file not found';
        }

        # 🔧 NAMED LOCATION: PÁGINA DE MANTENIMIENTO
        location @maintenance {
            root /www/wwwroot/test-fideliza.yoisar.com/app;
            try_files /server/maintenance.html =503;
            internal;
        }

        # SPA FALLBACK (ÚLTIMA PRIORIDAD)
        location / {
            proxy_pass http://fideliza_backend_test;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;

            # Redirigir a mantenimiento si backend está caído (502 Bad Gateway, 503 Service Unavailable, 504 Gateway Timeout)
            error_page 502 503 504 = @maintenance;

            try_files $uri $uri/ /index.html;
        }

        access_log /www/wwwlogs/test_fideliza_yoisar_access.log;
        error_log /www/wwwlogs/test_fideliza_yoisar_error.log;
    }

