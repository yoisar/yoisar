            add_header Content-Type text/css always;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Fideliza-Asset "stylesheet" always;
            expires 1y;

            proxy_pass http://fideliza_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Redirigir a mantenimiento si backend está caído
            error_page 502 503 504 = @maintenance;
        }

        # OTRAS RUTAS EXPO
        location ^~ /_expo/ {
            add_header Cache-Control "public, max-age=86400" always;
            add_header X-Fideliza-Asset "expo-framework" always;

            proxy_pass http://fideliza_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Redirigir a mantenimiento si backend está caído
            error_page 502 503 504 = @maintenance;
        }

        # ARCHIVOS ESTÁTICOS
        location ^~ /static/ {
            add_header Cache-Control "public, max-age=86400" always;
            add_header X-Fideliza-Asset "static" always;

            proxy_pass http://fideliza_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Redirigir a mantenimiento si backend está caído
            error_page 502 503 504 = @maintenance;
        }

        # IMÁGENES Y FUENTES
        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Fideliza-Asset "media" always;
            expires 1y;

            proxy_pass http://fideliza_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Redirigir a mantenimiento si backend está caído
            error_page 502 503 504 = @maintenance;
        }

        # HEALTH CHECK
        location = /health {
            add_header Content-Type application/json always;
            return 200 '{"status":"ok","app":"fideliza","domain":"$host","timestamp":"$time_iso8601"}';
        }

        # FALLBACK PARA JS NO ENCONTRADO
        location @js_not_found {
            add_header Content-Type application/javascript always;
            return 404 '// JavaScript file not found';
        }

        # 🔧 NAMED LOCATION: PÁGINA DE MANTENIMIENTO
        location @maintenance {
            root /www/wwwroot/fideliza.yoisar.com/app;
            try_files /server/maintenance.html =503;
            internal;
        }

        # SPA FALLBACK (ÚLTIMA PRIORIDAD)
        location / {
            proxy_pass http://fideliza_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;

            # Redirigir a mantenimiento si backend está caído (502 Bad Gateway, 503 Service Unavailable, 504 Gateway Timeout)
            error_page 502 503 504 = @maintenance;

            try_files $uri $uri/ /index.html;
        }

        access_log /www/wwwlogs/fideliza_yoisar_access.log;
        error_log /www/wwwlogs/fideliza_yoisar_error.log;
    }

