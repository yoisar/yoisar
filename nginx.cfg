        allow all;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name img.distriboo.yoisar.com;

    ssl_certificate /www/server/panel/vhost/cert/img.distriboo.yoisar.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/img.distriboo.yoisar.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Tamaño máximo para subida de imágenes (5 MB por imagen)
    client_max_body_size 10M;

    # Caché agresiva de imágenes (30 días en producción)
    location ~* \.(webp|jpg|jpeg|png|gif|svg|ico)$ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header 'Access-Control-Allow-Origin' 'https://distriboo.yoisar.com' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://distriboo.yoisar.com';
            add_header 'Access-Control-Allow-Methods' 'GET, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header 'Access-Control-Allow-Origin' 'https://distriboo.yoisar.com' always;
        add_header 'Access-Control-Allow-Methods' 'GET, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
    }

    access_log /www/wwwlogs/distriboo_prod_minio_access.log;
    error_log /www/wwwlogs/distriboo_prod_minio_error.log;
}

# ==============================================
# POR EL CARIBE FRONTEND (porelcaribe.dev.yoisar.com)
# Puerto host: 3100 → Next.js container (porelcaribe_vps_frontend)
# Carpeta staging VPS: /www/wwwroot/porelcaribe.dev.yoisar.com
# Repo monorepo: /www/wwwroot/guajira.dev.yoisar.com/porelcar/frontend
# ==============================================

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name porelcaribe.dev.yoisar.com;
    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/porelcaribe.dev.yoisar.com;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name porelcaribe.dev.yoisar.com;

    ssl_certificate /www/server/panel/vhost/cert/porelcaribe.dev.yoisar.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/porelcaribe.dev.yoisar.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Assets estáticos de Next.js (cache inmutable 1 año)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Template assets (CityTours CSS/JS/IMG)
    location /template/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Imágenes locales
    location /img/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Todo lo demás → Next.js (puerto 3100)
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    access_log /www/wwwlogs/porelcaribe_dev_access.log;
    error_log /www/wwwlogs/porelcaribe_dev_error.log;
}

